<!DOCTYPE html>
<html>
<head>
    <title>Informe Patológico</title>
    <meta charset="utf-8">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        @page {
            size: A4;
            margin: 15mm 20mm 20mm 20mm;
        }
        body {
            font-family: Arial, sans-serif;
            font-size: 10.5pt;
            line-height: 1.5;
            color: #000;
            margin: 0;
            padding: 0;
        }
        .header-container {
            width: 100%;
            margin-bottom: 20px;
            text-align: center;
        }
        .header-img {
            width: 100%;
            height: auto;
            object-fit: contain;
        }
        .meta-table {
            width: 100%;
            border-collapse: collapse;
            border: 1.2px solid #5a85b5;
            margin-bottom: 25px;
        }
        .meta-cell {
            border: 0.8px solid #5a85b5;
            padding: 4px 12px;
            font-size: 9.5pt;
            color: #000;
            vertical-align: middle;
        }
        .meta-label {
            font-weight: bold;
        }
        .code-cell {
            border: 0.8px solid #5a85b5;
            text-align: center;
            vertical-align: middle;
            font-size: 26pt;
            font-weight: bold;
            width: 25%;
            color: #000;
        }
        .section-title {
            font-weight: bold;
            font-size: 11pt;
            color: #000;
            margin-top: 25px;
            margin-bottom: 8px;
            text-transform: uppercase;
            border-bottom: 2.5px solid #5a85b5;
            padding-bottom: 4px;
            letter-spacing: 0.5px;
        }
        .section-content {
            margin-bottom: 25px;
            white-space: pre-wrap;
            font-size: 9.5pt;
            text-align: justify;
            padding-left: 2px;
            line-height: 1.5;
        }
        .diag-content {
            line-height: 1.6;
        }
        .diag-specimen {
            text-decoration: underline;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 4px;
        }
        .diag-text {
            font-weight: bold;
            font-size: 11pt;
        }
        .report-images {
            display: flex;
            justify-content: center;
            gap: 25px;
            margin-top: 25px;
            margin-bottom: 25px;
            page-break-inside: avoid;
        }
        .report-img {
            max-height: 220px;
            border: 1.5px solid #000;
            border-radius: 4px;
            object-fit: contain;
        }
        .footer-signature {
            margin-top: 40px;
            display: flex;
            justify-content: flex-end;
            page-break-inside: avoid;
        }
        .sig-block {
            text-align: center;
            width: 250px;
        }
        .sig-img {
            max-width: 220px;
            height: auto;
        }
        .page-footer {
            display: none;
        }
        @media print {
            .no-print {
                display: none;
            }
            body {
                background-color: #fff;
            }
        }
        .print-btn-container {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 1000;
        }
        .print-btn {
            background-color: #1e3a8a;
            color: #fff;
            border: none;
            padding: 10px 20px;
            font-size: 11pt;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.15);
            transition: background-color 0.2s ease;
        }
        .print-btn:hover {
            background-color: #153066;
        }
    </style>
</head>
<body>
    <div class="print-btn-container no-print">
        <button class="print-btn" onclick="window.print()">Imprimir / Guardar PDF</button>
    </div>
    
    <div class="header-container">
        <img src="header_reporte.png?v=2" class="header-img">
    </div>

    <table class="meta-table">
        <tr>
            <td colspan="2" class="meta-cell"><span class="meta-label">APELLIDOS Y NOMBRES :</span> <span id="lblNombres"></span></td>
            <td rowspan="3" class="code-cell" id="lblCodigo"></td>
        </tr>
        <tr>
            <td class="meta-cell"><span class="meta-label">EDAD :</span> <span id="lblEdad"></span> AÑOS</td>
            <td class="meta-cell"><span class="meta-label">SEXO :</span> <span id="lblSexo"></span></td>
        </tr>
        <tr>
            <td class="meta-cell"><span class="meta-label">FECHA DE RECEPCIÓN :</span> <span id="lblRecepcion"></span></td>
            <td class="meta-cell"><span class="meta-label">FECHA DE INFORME :</span> <span id="lblInforme"></span></td>
        </tr>
        <tr>
            <td colspan="3" class="meta-cell"><span class="meta-label">INDICACIÓN:</span> <span id="lblIndicacion"></span></td>
        </tr>
    </table>

    <div class="section-title">DESCRIPCIÓN MACROSCÓPICA:</div>
    <div class="section-content" id="lblMacro"></div>

    <div class="section-title">DESCRIPCIÓN MICROSCÓPICA:</div>
    <div class="section-content" id="lblMicro"></div>

    <div class="section-title">DIAGNÓSTICO HISTOLOGICO:</div>
    <div class="section-content diag-content">
        <span class="diag-specimen" id="lblEspecimen"></span><br>
        <span class="diag-text" id="lblDiagnostico"></span>
    </div>

    <div class="report-images" id="imagesContainer" style="display: none;">
        <!-- Images dynamically added here -->
    </div>

    <div class="footer-signature">
        <div class="sig-block">
            <img src="firma_sello.png" class="sig-img">
        </div>
    </div>

    <div class="page-footer">
        <div class="page-footer-left">
            <span class="page-footer-icon"></span>
            <span id="lblFooterText"></span>
        </div>
        <div class="page-number"></div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const dataStr = localStorage.getItem('printPatientData');
            if (!dataStr) {
                alert('No hay datos para imprimir.');
                return;
            }
            const patient = JSON.parse(dataStr);
            
            const formattedDate = (d) => {
                if (!d) return '';
                const parts = d.split('-');
                if (parts.length === 3) {
                    return `${parts[2]}/${parts[1]}/${parts[0]}`;
                }
                return d;
            };
            
            let nombresApellidos = '';
            if (patient.apellidos && patient.nombres) {
                nombresApellidos = `${patient.apellidos}, ${patient.nombres}`.toUpperCase();
            } else {
                nombresApellidos = (patient.apellidos || patient.nombres || patient.paciente || '').toUpperCase();
            }
            const age = patient.edad || 66;
            const sex = (patient.sexo === 'F' || patient.sexo === 'FEMENINO' || patient.sexo === 'f') ? 'FEMENINO' : 'MASCULINO';
            const code = patient.codAtencion;
            const dateRecepcion = formattedDate(patient.fecRegistro || '2026-07-04');
            const dateInforme = formattedDate(patient.fecEntrega || '2026-07-09');
            const indicacion = (patient.medSolicitante || 'DR. JAIME VICTOR BECERRA ULFE').toUpperCase();
            
            const macro = patient.macroDesc || 'Se recibe fragmentos de tejido. Se incluye todo.';
            const micro = patient.microDesc || 'Evaluación compatible con tejido remitido.';
            const diagnostico = patient.diagnostico || 'GASTRITIS CRÓNICA NO ACTIVA.';
            const motivoEstudio = (patient.motivoEstudio || patient.especimen || 'BIOPSIA').toUpperCase();

            // Populate labels
            document.getElementById('lblNombres').textContent = nombresApellidos;
            document.getElementById('lblCodigo').textContent = code;
            document.getElementById('lblEdad').textContent = age;
            document.getElementById('lblSexo').textContent = sex;
            document.getElementById('lblRecepcion').textContent = dateRecepcion;
            document.getElementById('lblInforme').textContent = dateInforme;
            document.getElementById('lblIndicacion').textContent = indicacion;
            document.getElementById('lblMacro').textContent = macro;
            document.getElementById('lblMicro').textContent = micro;
            document.getElementById('lblEspecimen').textContent = motivoEstudio + ':';
            document.getElementById('lblDiagnostico').textContent = diagnostico;
            document.getElementById('lblFooterText').textContent = `${code} - ${nombresApellidos}`;

            // Add images if any
            const imgContainer = document.getElementById('imagesContainer');
            if (patient.img01 || patient.img02) {
                imgContainer.style.display = 'flex';
                if (patient.img01) {
                    const img = document.createElement('img');
                    img.src = patient.img01;
                    img.className = 'report-img';
                    imgContainer.appendChild(img);
                }
                if (patient.img02) {
                    const img = document.createElement('img');
                    img.src = patient.img02;
                    img.className = 'report-img';
                    imgContainer.appendChild(img);
                }
            }

            // Wait for all images to load before printing
            const imgs = document.querySelectorAll('img');
            let loadedCount = 0;
            const totalImgs = imgs.length;
            
            const urlParams = new URLSearchParams(window.location.search);
            const triggerPrint = () => {
                // Ocultar botón de imprimir antes de capturar el PDF
                document.querySelector('.print-btn-container').style.display = 'none';
                
                const fileNameStr = `${code} ${patient.nombres || ''} ${patient.apellidos || ''}`.trim().toUpperCase().replace(/\s+/g, ' ') + '.pdf';
                const opt = {
                  margin:       [10, 10, 20, 10], // mm [arriba, derecha, abajo, izquierda]
                  filename:     fileNameStr,
                  image:        { type: 'jpeg', quality: 0.65 }, // Compresión ultra para reducir peso del PDF
                  html2canvas:  { scale: 1.5, useCORS: true }, // Reducción ligera de escala
                  jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' },
                  pagebreak:    { mode: ['css', 'legacy'] }
                };

                // Generar PDF y abrirlo en el visor nativo del navegador
                html2pdf().set(opt).from(document.body).toPdf().get('pdf').then((pdf) => {
                    const totalPages = pdf.internal.getNumberOfPages();
                    const footerText = `${code} ${patient.apellidos || ''} ${patient.nombres || ''}`.trim().toUpperCase() || `${code} ${patient.paciente.toUpperCase()}`;
                    
                    for (let i = 1; i <= totalPages; i++) {
                        pdf.setPage(i);
                        pdf.setFontSize(9.5);
                        pdf.setTextColor(0, 0, 0);
                        
                        const pageWidth = pdf.internal.pageSize.getWidth();
                        const pageHeight = pdf.internal.pageSize.getHeight();
                        
                        // Linea superior del footer
                        pdf.setDrawColor(90, 133, 181); // #5a85b5
                        pdf.setLineWidth(0.5);
                        pdf.line(20, pageHeight - 12, pageWidth - 20, pageHeight - 12);
                        
                        // Icono (circulo azul)
                        pdf.setFillColor(59, 116, 179); // #3b74b3
                        pdf.circle(21.5, pageHeight - 8.5, 1.5, 'F');
                        
                        // Texto izquierdo
                        pdf.setFont('helvetica', 'bold');
                        pdf.text(footerText, 25, pageHeight - 7.5);
                        
                        // Texto derecho
                        const rightText = `página ${i} de ${totalPages}`;
                        pdf.text(rightText, pageWidth - 20, pageHeight - 7.5, { align: 'right' });
                    }
                }).save().then(() => {
                    // Cerrar la ventana tras iniciar la descarga automática
                    setTimeout(() => window.close(), 500);
                });
            };
            
            if (totalImgs === 0) {
                triggerPrint();
            } else {
                imgs.forEach(img => {
                    if (img.complete) {
                        loadedCount++;
                        if (loadedCount === totalImgs) triggerPrint();
                    } else {
                        img.addEventListener('load', () => {
                            loadedCount++;
                            if (loadedCount === totalImgs) triggerPrint();
                        });
                        img.addEventListener('error', () => {
                            loadedCount++;
                            if (loadedCount === totalImgs) triggerPrint();
                        });
                    }
                });
            }
        });
    </script>
</body>
</html>

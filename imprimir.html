<!DOCTYPE html>
<html>
<head>
    <title>Informe Patológico</title>
    <!-- SDK de Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- Configuración de Supabase -->
    <script src="supabase_config.js?v=3.6"></script>
    <meta charset="utf-8">
    
    <style>
        @page {
            size: A4;
            margin-top: 0;
            margin-left: 20mm;
            margin-right: 20mm;
            margin-bottom: 20mm;

            @bottom-right {
                content: "página " counter(page) " de " counter(pages);
                font-family: Arial, sans-serif;
                font-size: 10pt;
                font-weight: bold;
                color: #000;
                vertical-align: top;
                margin-top: -28px;
                text-align: right;
            }
        }
        body {
            font-family: Arial, sans-serif;
            font-size: 10.5pt;
            line-height: 1.5;
            color: #000;
            margin: 0;
            padding: 0;
        }
        .header-container {
            width: 100%;
            margin-bottom: 20px;
            text-align: center;
        }
        .header-img {
            width: 100%;
            height: auto;
            object-fit: contain;
        }
        .meta-table {
            width: 100%;
            border-collapse: collapse;
            border: 1.2px solid #5a85b5;
            margin-bottom: 25px;
        }
        .meta-cell {
            border: 0.8px solid #5a85b5;
            padding: 4px 12px;
            font-size: 9.5pt;
            color: #000;
            vertical-align: middle;
        }
        .meta-label {
            font-weight: bold;
        }
        .code-cell {
            border: 0.8px solid #5a85b5;
            text-align: center;
            vertical-align: middle;
            font-size: 26pt;
            font-weight: bold;
            width: 25%;
            color: #000;
        }
        .section-title {
            font-weight: bold;
            font-size: 11pt;
            color: #000;
            margin-top: 25px;
            margin-bottom: 8px;
            text-transform: uppercase;
            border-bottom: 2.5px solid #5a85b5;
            padding-bottom: 4px;
            letter-spacing: 0.5px;
        }
        .section-content {
            margin-bottom: 25px;
            white-space: pre-wrap;
            font-size: 9.5pt;
            text-align: justify;
            padding-left: 2px;
            line-height: 1.5;
        }
        .diag-content {
            line-height: 1.6;
        }
        .diag-specimen {
            text-decoration: underline;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 4px;
        }
        .diag-text {
            font-weight: bold;
            font-size: 11pt;
        }
        .report-images {
            display: flex;
            justify-content: center;
            gap: 25px;
            margin-top: 25px;
            margin-bottom: 25px;
            page-break-inside: avoid;
        }
        .report-img {
            max-height: 220px;
            border: 1.5px solid #000;
            border-radius: 4px;
            object-fit: contain;
        }
        .footer-signature {
            margin-top: 40px;
            display: flex;
            justify-content: flex-end;
            page-break-inside: avoid;
        }
        .sig-block {
            text-align: center;
            width: 250px;
        }
        .sig-img {
            max-width: 220px;
            height: auto;
        }
        .page-footer {
            display: none;
        }
        @media print {
            body {
                padding: 0 !important;
                box-sizing: border-box;
            }
            .no-print {
                display: none;
            }
            body {
                background-color: #fff;
            }
        }
        .print-btn-container {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 1000;
        }
        .print-btn {
            background-color: #1e3a8a;
            color: #fff;
            border: none;
            padding: 10px 20px;
            font-size: 11pt;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.15);
            transition: background-color 0.2s ease;
        }
        .print-btn:hover {
            background-color: #153066;
        }
    
        @media print {
            .print-btn-container { display: none !important; }
            #print-footer {
                position: fixed;
                bottom: 0;
                left: 0;
                width: 100%;
                border-top: 1.5px solid #5a85b5;
                padding-top: 8px;
                padding-bottom: 5px;
                display: flex !important;
                justify-content: space-between;
                align-items: center;
                font-size: 10pt;
                font-family: Helvetica, Arial, sans-serif;
                font-weight: bold;
                height: 30px;
                z-index: 1000;
            }
            body { margin: 0; }
        }
        #print-footer { display: none; }

    </style>
</head>
<body>
    <!-- Overlay de Carga premium en tiempo real -->
    <div id="loadingOverlay" style="position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #ffffff; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; font-family: Arial, sans-serif; transition: opacity 0.5s ease;">
        <div style="border: 4px solid #f3f3f3; border-top: 4px solid #1b3e85; border-radius: 50%; width: 45px; height: 45px; animation: spin 1s linear infinite; margin-bottom: 20px;"></div>
        <div style="font-size: 16px; color: #1b3e85; font-weight: bold; letter-spacing: -0.01em;">Cargando informe en tiempo real...</div>
        <style>
            @keyframes spin {
                0% { transform: rotate(0deg); }
                100% { transform: rotate(360deg); }
            }
        </style>
    </div>

<table style="width: 100%; border: none; border-collapse: collapse;">
    <thead><tr><td><div class="header-space" style="height: 15mm;"></div></td></tr></thead>
    <tbody>
        <tr>
            <td style="padding: 0;">
                
    <div class="print-btn-container no-print">
        <button class="print-btn" onclick="generatePdf()">Descargar PDF</button>
    </div>
    
    <div class="header-container">
        <img src="header_reporte.png?v=2" class="header-img">
    </div>

    <table class="meta-table">
        <tr>
            <td colspan="2" class="meta-cell"><span class="meta-label">APELLIDOS Y NOMBRES :</span> <span id="lblNombres"></span></td>
            <td rowspan="3" class="code-cell" id="lblCodigo"></td>
        </tr>
        <tr>
            <td class="meta-cell"><span class="meta-label">EDAD :</span> <span id="lblEdad"></span> AÑOS</td>
            <td class="meta-cell"><span class="meta-label">SEXO :</span> <span id="lblSexo"></span></td>
        </tr>
        <tr>
            <td class="meta-cell"><span class="meta-label">FECHA DE RECEPCIÓN :</span> <span id="lblRecepcion"></span></td>
            <td class="meta-cell"><span class="meta-label">FECHA DE INFORME :</span> <span id="lblInforme"></span></td>
        </tr>
        <tr>
            <td colspan="3" class="meta-cell"><span class="meta-label">INDICACIÓN:</span> <span id="lblIndicacion"></span></td>
        </tr>
    </table>

    <div class="section-title">DESCRIPCIÓN MACROSCÓPICA:</div>
    <div class="section-content" id="lblMacro"></div>

    <div class="section-title">DESCRIPCIÓN MICROSCÓPICA:</div>
    <div class="section-content" id="lblMicro"></div>

    <div class="section-title">DIAGNÓSTICO HISTOLOGICO:</div>
    <div class="section-content diag-content">
        <span class="diag-specimen" id="lblEspecimen"></span><br>
        <span class="diag-text" id="lblDiagnostico"></span>
    </div>

    <div class="report-images" id="imagesContainer" style="display: none;">
        <!-- Images dynamically added here -->
    </div>

    <div class="footer-signature">
        <div class="sig-block">
            <img src="firma_sello.png" class="sig-img">
        </div>
    </div>

    <div class="page-footer">
        <div class="page-footer-left">
            <span class="page-footer-icon"></span>
            <span id="lblFooterText"></span>
        </div>
        <div class="page-number"></div>
    </div>

    
            </td>
        </tr>
    </tbody>
    <tfoot>
        <tr>
            <td style="padding: 0;">
                <div class="footer-space" style="height: 30mm;"></div>
            </td>
        </tr>
    </tfoot>
</table>
<script>
        document.addEventListener('DOMContentLoaded', async () => {
            const urlParams = new URLSearchParams(window.location.search);
            const paramCodAtencion = urlParams.get('codAtencion');
            const isAutoDownload = urlParams.get('autoDownload') === 'true';

            let patient = null;

            // 1. Intentar primero localStorage (lectura instantánea 0 ms para Vista Previa, Firma y Tabla)
            const dataStr = localStorage.getItem('printPatientData');
            if (dataStr) {
                try {
                    const localPat = JSON.parse(dataStr);
                    if (!paramCodAtencion || localPat.codAtencion === paramCodAtencion) {
                        patient = localPat;
                        console.log("[imprimir.html] Datos cargados de localStorage al instante.");
                    }
                } catch (e) {
                    console.error("Error al parsear printPatientData de localStorage", e);
                }
            }

            // 2. Si no se encontró en localStorage y hay codAtencion, consultar a Supabase con timeout de seguridad (2.5s)
            if (!patient && paramCodAtencion && window.supabase && typeof window.SUPABASE_CONFIG !== 'undefined') {
                try {
                    const supabasePromise = window.supabase
                        .from('pacientes')
                        .select('*')
                        .eq('cod_atencion', paramCodAtencion)
                        .maybeSingle();
                    
                    const timeoutPromise = new Promise((_, reject) => setTimeout(() => reject(new Error("Supabase Timeout")), 2500));
                    const res = await Promise.race([supabasePromise, timeoutPromise]);
                    
                    if (res && res.data) {
                        const data = res.data;
                        patient = {
                            codAtencion: data.cod_atencion,
                            dni: data.dni,
                            nombres: data.nombres,
                            apellidos: data.apellidos,
                            paciente: data.paciente,
                            edad: data.edad,
                            sexo: data.sexo === 'M' ? 'MASCULINO' : (data.sexo === 'F' ? 'FEMENINO' : 'MASCULINO'),
                            fecRegistro: data.fec_registro,
                            fecEntrega: data.fec_entrega,
                            medSolicitante: data.med_solicitante,
                            especimen: data.especimen,
                            motivoEstudio: data.motivo_estudio,
                            macroDesc: data.macro_desc,
                            microDesc: data.micro_desc,
                            diagnostico: data.diagnostico,
                            img01: data.img01,
                            img02: data.img02
                        };
                    }
                } catch (e) {
                    console.error("[Supabase Fetch Error]", e);
                }
            }

            // 3. Fallback de IndexedDB si falla Supabase o estamos offline
            if (!patient && paramCodAtencion) {
                try {
                    const IDB_NAME = 'ClinicaReportesDB';
                    const STORE_NAME = 'pacientes_completos';
                    const db = await new Promise((resolve, reject) => {
                        const request = indexedDB.open(IDB_NAME, 1);
                        request.onupgradeneeded = (e) => {
                            const db = e.target.result;
                            if (!db.objectStoreNames.contains(STORE_NAME)) {
                                db.createObjectStore(STORE_NAME, { keyPath: 'codAtencion' });
                            }
                        };
                        request.onsuccess = (e) => resolve(e.target.result);
                        request.onerror = (e) => reject(e.target.error);
                    });
                    const dbPat = await new Promise((resolve, reject) => {
                        const tx = db.transaction(STORE_NAME, 'readonly');
                        const store = tx.objectStore(STORE_NAME);
                        const req = store.get(paramCodAtencion);
                        req.onsuccess = () => resolve(req.result);
                        req.onerror = () => reject(req.error);
                    });
                    if (dbPat) {
                        patient = dbPat;
                        console.log("[IndexedDB] Datos cargados con éxito.");
                    }
                } catch (e) {
                    console.error("[IndexedDB Fetch Error]", e);
                }
            }

            const overlay = document.getElementById('loadingOverlay');

            if (!patient) {
                if (overlay) {
                    overlay.innerHTML = `
                        <div style="background:#fee2e2; padding:30px; border-radius:8px; border:1px solid #fecaca; text-align:center; max-width:400px; font-family:Arial,sans-serif;">
                            <h3 style="color:#b91c1c; margin-bottom:10px;">❌ Error de Carga</h3>
                            <p style="color:#7f1d1d; font-size:14px; margin-bottom:20px;">No se pudo encontrar el informe solicitado o no hay datos para imprimir.</p>
                            <button onclick="window.close()" style="background:#dc2626; color:white; border:none; padding:10px 20px; border-radius:5px; cursor:pointer;">Cerrar Ventana</button>
                        </div>
                    `;
                } else {
                    alert('No hay datos para imprimir.');
                }
                return;
            }

            // Ocultar cargador con transición garantizada
            if (overlay) {
                overlay.style.opacity = '0';
                setTimeout(() => {
                    if (overlay && overlay.parentNode) overlay.remove();
                }, 500);
            }
            
            const formattedDate = (d) => {
                if (!d) return '';
                const parts = d.split('-');
                if (parts.length === 3) {
                    return `${parts[2]}/${parts[1]}/${parts[0]}`;
                }
                return d;
            };
            
            let nombresApellidos = '';
            if (patient.apellidos && patient.nombres) {
                nombresApellidos = `${patient.apellidos}, ${patient.nombres}`.toUpperCase();
            } else {
                nombresApellidos = (patient.apellidos || patient.nombres || patient.paciente || '').toUpperCase();
            }
            const age = patient.edad || 66;
            const sex = (patient.sexo === 'F' || patient.sexo === 'FEMENINO' || patient.sexo === 'f') ? 'FEMENINO' : 'MASCULINO';
            const code = patient.codAtencion || '';
            const dateRecepcion = formattedDate(patient.fecRegistro || '2026-07-04');
            const dateInforme = formattedDate(patient.fecEntrega || '2026-07-09');
            const indicacion = (patient.medSolicitante || 'DR. JAIME VICTOR BECERRA ULFE').toUpperCase();
            
            const macro = patient.macroDesc || 'Se recibe fragmentos de tejido. Se incluye todo.';
            const micro = patient.microDesc || 'Evaluación compatible con tejido remitido.';
            const diagnostico = patient.diagnostico || 'GASTRITIS CRÓNICA NO ACTIVA.';
            const motivoEstudio = (patient.motivoEstudio || patient.especimen || 'BIOPSIA').toUpperCase();

            // Poblado de etiquetas
            if (document.getElementById('lblNombres')) document.getElementById('lblNombres').textContent = nombresApellidos;
            if (document.getElementById('lblCodigo')) document.getElementById('lblCodigo').textContent = code;
            if (document.getElementById('lblEdad')) document.getElementById('lblEdad').textContent = age;
            if (document.getElementById('lblSexo')) document.getElementById('lblSexo').textContent = sex;
            if (document.getElementById('lblRecepcion')) document.getElementById('lblRecepcion').textContent = dateRecepcion;
            if (document.getElementById('lblInforme')) document.getElementById('lblInforme').textContent = dateInforme;
            if (document.getElementById('lblIndicacion')) document.getElementById('lblIndicacion').textContent = indicacion;
            if (document.getElementById('lblMacro')) document.getElementById('lblMacro').innerHTML = macro;
            if (document.getElementById('lblMicro')) document.getElementById('lblMicro').innerHTML = micro;
            if (document.getElementById('lblEspecimen')) document.getElementById('lblEspecimen').textContent = motivoEstudio + ':';
            if (document.getElementById('lblDiagnostico')) document.getElementById('lblDiagnostico').innerHTML = diagnostico;
            if (document.getElementById('lblFooterText')) document.getElementById('lblFooterText').textContent = `${code} - ${nombresApellidos}`;

            // Adjuntar imágenes si existen
            const imgContainer = document.getElementById('imagesContainer');
            if (imgContainer && (patient.img01 || patient.img02)) {
                imgContainer.style.display = 'flex';
                if (patient.img01) {
                    const img = document.createElement('img');
                    img.src = patient.img01;
                    img.className = 'report-img';
                    imgContainer.appendChild(img);
                }
                if (patient.img02) {
                    const img = document.createElement('img');
                    img.src = patient.img02;
                    img.className = 'report-img';
                    imgContainer.appendChild(img);
                }
            }

            // Gestión de imágenes con timeout de seguridad (2.0s max)
            const imgs = document.querySelectorAll('img');
            let loadedCount = 0;
            const totalImgs = imgs.length;

            window.generatePdf = () => {
                const btnBox = document.querySelector('.print-btn-container');
                if (btnBox) btnBox.style.display = 'none';
                
                // Formato de nombre: CÓDIGO APELLIDOS NOMBRES
                let pName = patient.apellidos ? `${patient.apellidos}_${patient.nombres || ''}` : (patient.paciente || '');
                const fileNameStr = `${code}_${pName}`.trim().toUpperCase().replace(/\s*,\s*/g, '_').replace(/\s+/g, '_').replace(/_+/g, '_');
                
                document.title = fileNameStr;
                
                const footerText = `${code} ${patient.apellidos || ''} ${patient.nombres || ''}`.trim().toUpperCase() || `${code} ${(patient.paciente || '').toUpperCase()}`;
                const ftr = document.getElementById('footer-patient-text');
                if (ftr) ftr.textContent = footerText;

                setTimeout(() => {
                    window.print();
                    
                    if (isAutoDownload) {
                        setTimeout(() => {
                            document.body.innerHTML = `
                                <div style="display:flex; flex-direction:column; justify-content:center; align-items:center; height:100vh; font-family:Arial,sans-serif; background-color:#f4f7f6;">
                                    <div style="background:white; padding:40px; border-radius:10px; box-shadow:0 4px 15px rgba(0,0,0,0.1); text-align:center;">
                                        <h2 style="color:#22c55e; margin-bottom:15px;">✔️ PDF Configurado</h2>
                                        <p style="color:#555; font-size:16px; margin-bottom:25px;">El cuadro de Guardar/Imprimir de Chrome se ha abierto.</p>
                                        <p style="color:#888; font-size:14px; margin-bottom:25px;">El archivo ya tiene el nombre automático: <br><strong style="color:#333;">${fileNameStr}.pdf</strong></p>
                                        <button onclick="window.close()" style="background:#3b82f6; color:white; border:none; padding:12px 24px; border-radius:5px; font-size:16px; cursor:pointer; box-shadow:0 2px 5px rgba(0,0,0,0.1);">Cerrar Ventana</button>
                                    </div>
                                </div>
                            `;
                        }, 1500);
                    }
                }, 500);
            };

            let printTriggered = false;
            const triggerPrintOnce = () => {
                if (printTriggered) return;
                printTriggered = true;
                const autoDownloadParam = urlParams.get('autoDownload');
                if (autoDownloadParam === 'false') {
                    console.log("[imprimir.html] Modo Vista Previa: No se dispara impresión automática.");
                    return;
                }
                window.generatePdf();
            };

            if (totalImgs === 0) {
                triggerPrintOnce();
            } else {
                const safetyTimer = setTimeout(() => {
                    triggerPrintOnce();
                }, 2000);

                imgs.forEach(img => {
                    if (img.complete) {
                        loadedCount++;
                        if (loadedCount === totalImgs) {
                            clearTimeout(safetyTimer);
                            triggerPrintOnce();
                        }
                    } else {
                        const onFinish = () => {
                            loadedCount++;
                            if (loadedCount === totalImgs) {
                                clearTimeout(safetyTimer);
                                triggerPrintOnce();
                            }
                        };
                        img.addEventListener('load', onFinish, { once: true });
                        img.addEventListener('error', onFinish, { once: true });
                    }
                });
            }
        });
    </script>

    <div id="print-footer">
        <div style="display: flex; align-items: center;">
            <span style="display:inline-block; width:12px; height:12px; background-color:#3b74b3; border-radius:50%; margin-right:8px; margin-left:15px;"></span>
            <span id="footer-patient-text" style="color: #000;"></span>
        </div>
    </div>
</body>
</html>
